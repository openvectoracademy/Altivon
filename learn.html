<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Content — Altivon Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Plus Jakarta Sans',sans-serif;color:#2C3E55;background:#FAFAF8;overflow:hidden;height:100vh;cursor:none}
:root{--n1:#0B1F3A;--n2:#112D52;--g1:#B8751A;--g2:#CF8B28;--g3:#E8A840;--white:#FFFFFF;--off0:#FAFAF8;--off1:#F4F1EB;--t2:#2C3E55;--t3:#5A6B7E;--t4:#94A3B5;--b1:#E2E8EF;--b2:#CED6DF;--gold-bg:rgba(184,117,26,.07);--gold-edge:rgba(184,117,26,.22);--r1:8px;--r2:14px;--hh:64px;--ease-out:cubic-bezier(0.16,1,0.3,1)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
#cursor{position:fixed;width:12px;height:12px;background:var(--g1);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s var(--ease-out),height .25s var(--ease-out);will-change:left,top}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(184,117,26,.5);border-radius:50%;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:width .3s var(--ease-out),height .3s var(--ease-out);will-change:left,top}
.cursor-expanded #cursor{width:18px;height:18px;background:var(--g2)}.cursor-expanded #cursor-ring{width:52px;height:52px;opacity:.6}
@media(max-width:960px){#cursor,#cursor-ring{display:none}body{cursor:auto}}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--hh);background:rgba(250,250,248,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);z-index:100;display:flex;align-items:center;padding:0 20px;gap:16px}
#topbar .back-btn{width:36px;height:36px;border-radius:var(--r1);border:1px solid var(--b1);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:none;text-decoration:none;transition:all .25s;flex-shrink:0}
#topbar .back-btn:hover{background:var(--off0);border-color:var(--b2)}
#topbar .back-btn svg{width:16px;height:16px;stroke:var(--t3);stroke-width:2}
#topbar .course-info{flex:1;min-width:0}
#topbar .course-title{font-family:'Fraunces',serif;font-weight:600;font-size:1rem;color:var(--n1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .course-meta{font-size:.75rem;color:var(--t4)}
#sidebar-toggle{display:none;width:36px;height:36px;border-radius:var(--r1);border:1px solid var(--b1);background:var(--white);cursor:none;align-items:center;justify-content:center;flex-shrink:0}
#sidebar-toggle svg{width:18px;height:18px;stroke:var(--t3);stroke-width:2}
#layout{display:flex;height:100vh;padding-top:var(--hh)}
#sidebar{width:340px;min-width:340px;background:var(--white);border-right:1px solid var(--b1);overflow-y:auto;transition:transform .35s var(--ease-out);z-index:50}
#sidebar-inner{padding:16px}
.tree-item{margin-bottom:2px}
.tree-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r1);cursor:none;font-size:.88rem;font-weight:500;color:var(--t2);transition:background .2s;width:100%;border:none;background:none;text-align:left;font-family:'Plus Jakarta Sans',sans-serif}
.tree-toggle:hover{background:var(--off0)}
.tree-toggle .arrow{width:16px;height:16px;transition:transform .25s;flex-shrink:0;stroke:var(--t4);stroke-width:2}
.tree-toggle.open .arrow{transform:rotate(90deg)}
.tree-children{overflow:hidden;max-height:0;transition:max-height .35s var(--ease-out)}
.tree-children.open{max-height:2000px}
.chapter-item{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 36px;border-radius:var(--r1);cursor:none;font-size:.84rem;color:var(--t3);transition:all .2s;border-left:2px solid transparent;font-family:'Plus Jakarta Sans',sans-serif;border:none;background:none;width:100%;text-align:left}
.chapter-item:hover{background:var(--off0);color:var(--t2)}
.chapter-item.active{background:var(--gold-bg);border-left-color:var(--g1);color:var(--n1);font-weight:600}
.chapter-item .progress-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chapter-item .progress-dot.green{background:#16A34A}.chapter-item .progress-dot.orange{background:#F59E0B}.chapter-item .progress-dot.gray{background:var(--b2)}
.chapter-item .lec-count{font-size:.72rem;color:var(--t4);margin-left:auto}
#main{flex:1;overflow-y:auto;background:var(--off0);padding:24px}
#main-inner{max-width:900px}
.breadcrumb{font-size:.78rem;color:var(--t4);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.breadcrumb span{color:var(--t3)}
.lecture-list{display:flex;flex-direction:column;gap:2px}
.lecture-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--white);border:1px solid var(--b1);border-radius:var(--r1);cursor:none;transition:all .25s;text-decoration:none;color:inherit}
.lecture-row:hover{border-color:var(--g1);transform:translateX(4px);box-shadow:0 2px 8px rgba(184,117,26,.08)}
.lecture-row .lec-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lecture-row .lec-status.green{background:#16A34A}.lecture-row .lec-status.orange{background:#F59E0B}.lecture-row .lec-status.gray{background:var(--b2)}
.lecture-row .lec-num{font-family:'Fraunces',serif;font-weight:600;font-size:.9rem;color:var(--t4);min-width:28px}
.lecture-row .lec-title{flex:1;font-weight:500;font-size:.9rem;color:var(--t2)}
.lecture-row .lec-meta{font-size:.75rem;color:var(--t4);display:flex;align-items:center;gap:12px}
.pdf-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:20px;font-size:.7rem;color:var(--g1);font-weight:600;cursor:none;text-decoration:none;transition:all .25s}
.pdf-badge:hover{background:var(--g1);color:var(--white);border-color:var(--g1)}
.resources-section{margin-top:32px;padding-top:24px;border-top:1px solid var(--b1)}
.resources-section h4{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--n1);margin-bottom:12px}
.resource-link{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--white);border:1px solid var(--b1);border-radius:var(--r1);text-decoration:none;color:var(--t2);font-size:.85rem;margin-bottom:6px;transition:all .25s}
.resource-link:hover{border-color:var(--g1);background:var(--gold-bg)}
.resource-link svg{width:16px;height:16px;stroke:var(--g1)}
.empty-msg{text-align:center;padding:40px;color:var(--t4);font-size:.9rem}
.loading-state{text-align:center;padding:60px;color:var(--t4)}
.spinner{width:32px;height:32px;border:3px solid var(--b1);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(11,31,58,.4);z-index:40}
@media(max-width:900px){
  #sidebar{position:fixed;top:var(--hh);left:0;bottom:0;transform:translateX(-100%);z-index:45}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.active{display:block}
  #sidebar-toggle{display:flex}
  #main{padding:16px}
}
</style>
</head>
<body>
<div id="cursor"></div><div id="cursor-ring"></div>

<div id="topbar">
  <a href="/dashboard.html" class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="course-info"><div class="course-title" id="courseTitle">Loading...</div><div class="course-meta" id="courseMeta"></div></div>
  <button id="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
</div>

<div id="layout">
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="sidebar"><div id="sidebar-inner"><div class="loading-state"><div class="spinner"></div></div></div></div>
  <div id="main"><div id="main-inner"><div class="loading-state"><div class="spinner"></div>Loading course content...</div></div></div>
</div>

<script>
(function(){
'use strict';
const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function track(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;if(cur){cur.style.left=mx+'px';cur.style.top=my+'px'}if(ring){ring.style.left=rx+'px';ring.style.top=ry+'px'}requestAnimationFrame(track)})();
document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,.tree-toggle,.chapter-item,.lecture-row,.pdf-badge,.back-btn'))document.body.classList.add('cursor-expanded')});
document.addEventListener('mouseout',e=>{if(e.target.closest('a,button,.tree-toggle,.chapter-item,.lecture-row,.pdf-badge,.back-btn'))document.body.classList.remove('cursor-expanded')});

const urlParams=new URLSearchParams(window.location.search);const courseId=urlParams.get('course');
const token=localStorage.getItem('token');if(!token){window.location.href='/auth.html'}

let courseData=null;let selectedChapterId=null;

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('active')}

async function loadCourse(){
try{const r=await fetch(`/api/courses/${courseId}`,{headers:{'Authorization':'Bearer '+token}});
if(!r.ok){if(r.status===403){window.location.href='/explore.html'}throw 0}
courseData=await r.json();
document.getElementById('courseTitle').textContent=courseData.title;
document.getElementById('courseMeta').textContent=`${courseData.subject_area||'Course'} · ${courseData.difficulty_level||'All Levels'}`;
buildSidebar();if(courseData.subjects&&courseData.subjects.length)selectFirstChapter()}catch(e){document.getElementById('main-inner').innerHTML='<div class="empty-msg">Failed to load course. Please try again.</div>'}}

function buildSidebar(){
const sidebar=document.getElementById('sidebar-inner');if(!courseData||!courseData.subjects){sidebar.innerHTML='<div class="empty-msg">No content yet</div>';return}
sidebar.innerHTML=courseData.subjects.map((subj,si)=>`<div class="tree-item"><button class="tree-toggle" onclick="toggleTree(this,'subj-${si}')"><svg class="arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>${subj.name}</button><div class="tree-children" id="subj-${si}">${(subj.papers||[]).map((paper,pi)=>`<div class="tree-item" style="padding-left:16px"><button class="tree-toggle" onclick="toggleTree(this,'pap-${si}-${pi}')"><svg class="arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>${paper.name}</button><div class="tree-children" id="pap-${si}-${pi}">${(paper.chapters||[]).map((ch,ci)=>`<button class="chapter-item" data-chapter-id="${ch.id}" onclick="selectChapter(${ch.id})"><span class="progress-dot gray"></span>${ch.title}<span class="lec-count">${(ch.lectures||[]).length}/${(ch.lectures||[]).length}</span></button>`).join('')}</div></div>`).join('')}</div></div>`).join('')}

function toggleTree(btn,id){btn.classList.toggle('open');document.getElementById(id).classList.toggle('open')}
function selectFirstChapter(){if(!courseData||!courseData.subjects)return;for(const subj of courseData.subjects){if(!subj.papers)continue;for(const paper of subj.papers){if(!paper.chapters||!paper.chapters.length)continue;selectedChapterId=paper.chapters[0].id;selectChapter(selectedChapterId);return}}}

function selectChapter(chId){
selectedChapterId=chId;
document.querySelectorAll('.chapter-item').forEach(el=>el.classList.toggle('active',el.dataset.chapterId==String(chId)));
let chapter=null;let paperName='';let subjectName='';
if(courseData&&courseData.subjects){for(const subj of courseData.subjects){if(!subj.papers)continue;for(const paper of subj.papers){if(!paper.chapters)continue;for(const ch of paper.chapters){if(ch.id===chId){chapter=ch;paperName=paper.name;subjectName=subj.name;break}}if(chapter)break}if(chapter)break}}
const main=document.getElementById('main-inner');
if(!chapter){main.innerHTML='<div class="empty-msg">No lectures in this chapter yet.</div>';return}
main.innerHTML=`<div class="breadcrumb">${subjectName}<span>/</span>${paperName}<span>/</span>${chapter.title}</div><div class="lecture-list">${(chapter.lectures||[]).map((lec,i)=>`<a href="/watch.html?lecture=${lec.id}&course=${courseId}" class="lecture-row"><span class="lec-status gray"></span><span class="lec-num">${String(i+1).padStart(2,'0')}</span><span class="lec-title">${lec.title}</span><span class="lec-meta">${(lec.pdfs||[]).map(p=>`<span class="pdf-badge" onclick="event.preventDefault();window.open('${p.url}','_blank')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>${p.title}</span>`).join('')}</span></a>`).join('')}</div>${courseData.resources&&courseData.resources.length?`<div class="resources-section"><h4>Course Resources</h4>${courseData.resources.map(r=>`<a href="${r.url}" target="_blank" class="resource-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>${r.title}</a>`).join('')}</div>`:''}`}
window.toggleTree=toggleTree;window.selectChapter=selectChapter;window.toggleSidebar=toggleSidebar;
loadCourse();
})();
</script>
</body>
</html>
